services:
  tts:
    build: .
    restart: unless-stopped
    expose:
      - "3100"
    environment:
      - PORT=3100
      - TTS_API_SECRET=${TTS_API_SECRET}
      - ALLOWED_ORIGINS=https://www.yuryprimakov.com,https://yuryprimakov.com
    mem_limit: 1g
    cpus: 1.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tts.rule=Host(`tts.imadefire.com`)"
      - "traefik.http.routers.tts.entrypoints=websecure"
      - "traefik.http.routers.tts.tls.certresolver=mytlschallenge"
      - "traefik.http.services.tts.loadbalancer.server.port=3100"
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: root_default
